<div class="admin-groups-container py-4 px-2">
  <div class="card mb-4 shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h2 class="h5 mb-0">Manage User Groups</h2>
      <span class="badge bg-primary-subtle text-primary" *ngIf="groups.length">
        {{ groups.length }} groups
      </span>
    </div>
    <div class="card-body">
      <div class="create-group row g-2 align-items-end">
        <div class="col-12 col-md-8">
          <label class="form-label mb-1">Create New Group</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="newGroupName"
            name="newGroupName"
            placeholder="Group name"
          />
        </div>
        <div class="col-12 col-md-4 text-md-end">
          <button class="btn btn-primary" (click)="createGroup()">
            Create Group
          </button>
        </div>
      </div>

      <hr class="my-3" />

      <div class="assign-user row g-3 align-items-end">
        <div class="col-12 col-md-5">
          <label class="form-label">Group</label>
          <select
            class="form-select"
            [(ngModel)]="selectedGroupId"
            name="selectedGroupId"
            (ngModelChange)="updateAvailableUsers()"
          >
            <option [ngValue]="null">Select group</option>
            <option *ngFor="let g of groups" [ngValue]="g.groupId">
              {{ g.groupName }} ({{ g.groupMembers?.length || 0 }} members)
            </option>
          </select>
        </div>

        <div class="col-12 col-md-5">
          <label class="form-label">User</label>
          <select
            class="form-select"
            [(ngModel)]="selectedUserId"
            name="selectedUserId"
          >
            <option [ngValue]="null">Select user</option>
            <option *ngFor="let u of availableUsers" [ngValue]="u.userId">
              {{ u.username }}
            </option>
          </select>
        </div>

        <div class="col-12 col-md-2 text-md-end">
          <button class="btn btn-outline-primary w-100" (click)="assignUser()">
            Assign
          </button>
        </div>
      </div>

      <div *ngIf="loading" class="mt-3 text-muted small">
        Loading groups...
      </div>
    </div>
  </div>

  <div class="groups-list" *ngIf="!loading">
    <h3 class="h6 mb-3">All Groups</h3>
    <div *ngFor="let group of groups" class="group-card card mb-2 shadow-sm">
      <div class="card-header group-card-header d-flex justify-content-between align-items-center">
        <h4 class="h6 mb-0">{{ group.groupName }}</h4>
        <button
          class="btn btn-sm btn-outline-danger"
          (click)="deleteGroup(group.groupId)"
        >
          Delete Group
        </button>
      </div>
      <div class="card-body py-2">
        <p
          class="mb-2 text-muted small"
          *ngIf="!group.groupMembers || group.groupMembers.length === 0"
        >
          No members in this group.
        </p>
        <ul
          class="list-unstyled mb-0"
          *ngIf="group.groupMembers && group.groupMembers.length > 0"
        >
          <li
            *ngFor="let member of group.groupMembers"
            class="d-flex justify-content-between align-items-center py-1 border-bottom small"
          >
            <span>{{ member.username }}</span>
            <div class="btn-group btn-group-sm">
              <button class="btn btn-outline-primary" (click)="messageUser(member.userId)">
                Message
              </button>
              <button
                class="btn btn-outline-secondary"
                (click)="removeUserFromGroup(group.groupId, member.userId)"
              >
                Remove
              </button>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
