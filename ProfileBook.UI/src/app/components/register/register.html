<div class="register-container py-4 px-2">
  <div class="card shadow-sm register-card">
    <div class="card-body">
      <h2 class="h4 mb-3 text-center">
        <span class="register-brand">ProfileBook</span> Register
      </h2>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" formControlName="username" />
          <div
            *ngIf="
              registerForm.get('username')?.invalid &&
              (registerForm.get('username')?.touched || submitted)
            "
            class="text-danger small mt-1"
          >
            Username is required.
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" formControlName="password" />
          <div
            *ngIf="
              registerForm.get('password')?.invalid &&
              (registerForm.get('password')?.touched || submitted)
            "
            class="text-danger small mt-1"
          >
            Password must be at least 6 characters.
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Profile image</label>
          <input
            type="file"
            class="form-control"
            (change)="onFileSelected($event)"
          />
          <div
            *ngIf="
              registerForm.get('profileImage')?.invalid &&
              (registerForm.get('profileImage')?.touched || submitted)
            "
            class="text-danger small mt-1"
          >
            Profile image is required.
          </div>
        </div>
        <button
          type="submit"
          class="btn btn-primary w-100"
        >
          Register
        </button>
      </form>
      <p class="mt-3 mb-0 text-center small">
        Already have an account?
        <a routerLink="/login">Login here</a>
      </p>
    </div>
  </div>
</div>
