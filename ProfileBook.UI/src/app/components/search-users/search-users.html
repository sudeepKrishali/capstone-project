<div class="search-container py-4 px-2">
  <h2 class="h4 mb-3">Search Users</h2>

  <form (ngSubmit)="search()" class="search-box">
    <input
      type="text"
      class="form-control"
      [(ngModel)]="searchTerm"
      name="searchTerm"
      placeholder="Search by username..."
    />

    <button type="submit" class="btn btn-primary">
      Search
    </button>
  </form>

  <div *ngIf="loading" class="loading">
    Loading...
  </div>

  <div *ngIf="!loading && hasSearched && users.length === 0" class="no-results text-muted small py-2">
    No users found.
  </div>

  <ul class="user-list list-group" *ngIf="!loading && users.length > 0">
    <li
      *ngFor="let user of users"
      class="user-card list-group-item border-0 shadow-sm"
    >
      <div class="user-info">
        <img
          *ngIf="user.profileImage"
          [src]="imageBaseUrl + user.profileImage"
          class="avatar rounded-circle"
          alt=""
          onerror="this.style.display='none'"
        />

        <span *ngIf="!user.profileImage" class="avatar-placeholder">
          {{ user.username.charAt(0) || '?' }}
        </span>

        <span class="username">
          {{ user.username || 'User' }}
        </span>
      </div>

      <div class="actions d-flex gap-2 flex-wrap justify-content-end">
        <button (click)="messageUser(user)" class="btn btn-sm btn-outline-primary">
          Message
        </button>

        <button (click)="openReportForm(user)" class="btn btn-sm btn-outline-danger">
          Report
        </button>
      </div>

      <div *ngIf="reportingUser?.userId === user.userId" class="report-form mt-2">
        <textarea
          [(ngModel)]="reportReason"
          name="reportReason"
          class="form-control mb-2"
          placeholder="Reason for report (optional)"
          rows="2"
        ></textarea>

        <div class="report-actions">
          <button type="button" class="btn btn-sm btn-primary" (click)="submitReport()">
            Submit Report
          </button>

          <button
            type="button"
            class="btn btn-sm btn-secondary"
            (click)="cancelReport()"
          >
            Cancel
          </button>
        </div>
      </div>
    </li>
  </ul>
</div>
