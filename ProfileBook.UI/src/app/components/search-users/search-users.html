<div class="search-container">
  <h2>Search Users</h2>

  <form (ngSubmit)="search()" class="search-box">

    <input
      type="text"
      [(ngModel)]="searchTerm"
      name="searchTerm"
      placeholder="Search by username..."
    />

    <button type="submit">Search</button>

  </form>

  <div *ngIf="loading" class="loading">
    Loading...
  </div>

  <div *ngIf="!loading && hasSearched && users.length === 0" class="no-results">
    No users found.
  </div>

  <ul class="user-list" *ngIf="!loading && users.length > 0">

    <li *ngFor="let user of users" class="user-card">

      <div class="user-info">

        <img
          *ngIf="user.profileImage"
          [src]="imageBaseUrl + user.profileImage"
          class="avatar"
          alt=""
          onerror="this.style.display='none'"
        />

        <span *ngIf="!user.profileImage" class="avatar-placeholder">
          {{ user.username?.charAt(0) || '?' }}
        </span>

        <span class="username">
          {{ user.username || 'User' }}
        </span>

      </div>

      <div class="actions">

        <button (click)="messageUser(user)" class="btn-message">
          Message
        </button>

        <button (click)="openReportForm(user)" class="btn-report">
          Report
        </button>

      </div>

      <div *ngIf="reportingUser?.userId === user.userId" class="report-form">

        <textarea
          [(ngModel)]="reportReason"
          name="reportReason"
          placeholder="Reason for report (optional)"
          rows="2"
        ></textarea>

        <div class="report-actions">

          <button type="button" (click)="submitReport()">
            Submit Report
          </button>

          <button type="button" (click)="cancelReport()" class="btn-cancel">
            Cancel
          </button>

        </div>

      </div>

    </li>

  </ul>
</div>
