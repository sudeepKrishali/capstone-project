<div class="login-container py-4 px-2">
  <div class="card shadow-sm login-card">
    <div class="card-body">
      <h2 class="h4 mb-3 text-center">
        <span class="login-brand">ProfileBook</span> Login
      </h2>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" formControlName="username" />
          <div
            *ngIf="
              loginForm.get('username')?.invalid &&
              (loginForm.get('username')?.touched || submitted)
            "
            class="text-danger small mt-1"
          >
            Username is required.
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" formControlName="password" />
          <div
            *ngIf="
              loginForm.get('password')?.invalid &&
              (loginForm.get('password')?.touched || submitted)
            "
            class="text-danger small mt-1"
          >
            Password is required.
          </div>
        </div>
        <button
          type="submit"
          class="btn btn-primary w-100"
        >
          Login
        </button>
      </form>
      <p class="mt-3 mb-0 text-center small">
        Don&apos;t have an account?
        <a routerLink="/register">Register here</a>
      </p>
    </div>
  </div>
</div>
