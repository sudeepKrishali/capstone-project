<div class="newsfeed-container container py-3">
  <div *ngIf="loading" class="loading text-muted small mb-2">
    Loading posts...
  </div>

  <div *ngIf="!loading && posts.length === 0" class="text-muted small">
    No posts to show yet.
  </div>

  <div *ngFor="let post of posts" class="post-card card shadow-sm mb-3">
    <div class="card-header d-flex align-items-center gap-2 flex-wrap">
      <img
        [src]="imageBaseUrl + post.user?.profileImage"
        class="avatar rounded-circle border border-light shadow-sm"
        alt="profile"
      />
      <div class="d-flex flex-column flex-grow-1 min-w-0">
        <strong>{{ post.user?.username || 'User' }}</strong>
      </div>
      <div
        *ngIf="isOwnPost(post) && editingPostId !== post.postId"
        class="post-owner-actions d-flex gap-1 ms-auto"
      >
        <button
          type="button"
          class="btn btn-sm btn-outline-secondary"
          (click)="startEdit(post)"
        >
          Edit
        </button>
        <button
          type="button"
          class="btn btn-sm btn-outline-danger"
          (click)="promptDeletePost(post.postId)"
        >
          Delete
        </button>
      </div>
    </div>

    <div class="card-body" *ngIf="editingPostId === post.postId; else postViewBody">
      <textarea
        class="form-control mb-2"
        rows="3"
        [(ngModel)]="editContent"
        placeholder="Post text"
      ></textarea>
      <label class="form-label small text-muted mb-1">Replace image (optional)</label>
      <input
        type="file"
        class="form-control form-control-sm mb-2"
        accept="image/*"
        (change)="onEditImageSelected($event)"
      />
      <div class="d-flex gap-2">
        <button
          type="button"
          class="btn btn-primary btn-sm"
          (click)="saveEdit(post.postId)"
        >
          Save
        </button>
        <button
          type="button"
          class="btn btn-outline-secondary btn-sm"
          (click)="cancelEdit()"
        >
          Cancel
        </button>
      </div>
    </div>
    <ng-template #postViewBody>
    <div class="card-body">
      <p class="mb-2">{{ post.content }}</p>

      <img
        *ngIf="post.postImage"
        [src]="imageBaseUrl + post.postImage"
        class="post-image img-fluid rounded mb-2 shadow-sm"
        alt="Post image"
      />

      <div class="post-actions mb-2">
        <button
          type="button"
          class="btn btn-sm"
          [ngClass]="{
            'btn-primary': isPostLikedByCurrentUser(post),
            'btn-outline-primary': !isPostLikedByCurrentUser(post)
          }"
          (click)="onLike(post.postId)"
        >
          Like ({{ post.likes.length || 0 }})
        </button>
      </div>

      <div class="comments-section">
        <div
          *ngFor="let comment of post.comments || []"
          class="comment mb-1 p-2 bg-light rounded-3 border"
        >
          <strong>
            <span *ngIf="comment.userId === currentUserId; else otherUser">
              You
            </span>
            <ng-template #otherUser>
              {{ comment.user?.username || 'User' }}
            </ng-template>
            :
          </strong>
          <span class="ms-1">{{ comment.text }}</span>
        </div>

        <div class="comment-input input-group input-group-sm mt-2">
          <input
            #commentInput
            type="text"
            class="form-control"
            placeholder="Write a comment..."
          />
          <button
            type="button"
            class="btn btn-primary btn-sm"
            (click)="onComment(post.postId, commentInput.value); commentInput.value=''"
          >
            Post
          </button>
        </div>
      </div>
    </div>
    </ng-template>
  </div>
</div>

<div
  *ngIf="showDeletePostModal"
  class="modal fade show d-block"
  tabindex="-1"
  role="dialog"
  aria-modal="true"
>
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Delete Post</h5>
        <button type="button" class="btn-close" aria-label="Close" (click)="cancelDeletePost()"></button>
      </div>
      <div class="modal-body">
        <p class="mb-0">Delete this post? This cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="cancelDeletePost()">Cancel</button>
        <button type="button" class="btn btn-danger" (click)="confirmDeletePost()">Delete</button>
      </div>
    </div>
  </div>
</div>
<div *ngIf="showDeletePostModal" class="modal-backdrop fade show"></div>
