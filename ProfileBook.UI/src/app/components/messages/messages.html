<div class="messages-container">
  <ng-container *ngIf="chatUserId; else inbox">
    <div class="chat-header d-flex align-items-center gap-2 mb-2">
      <a routerLink="/messages" class="back-link">&larr; Back</a>
      <h2 class="h5 mb-0">Chat with {{ otherUser?.username || 'User' }}</h2>
    </div>
    <div *ngIf="loading" class="loading small text-muted">Loading...</div>
    <div class="chat-area">
      <div class="messages-list" #messagesList>
        <div
          *ngFor="let msg of messages"
          [class.sent]="msg.senderId === currentUserId"
          [class.received]="msg.senderId !== currentUserId"
          class="message-bubble"
        >
          <span class="msg-text">{{ msg.messageContent }}</span>
          <span class="msg-time">{{ msg.timeStamp | date: 'short' }}</span>
        </div>
      </div>
      <div class="send-area">
        <input
          type="text"
          class="form-control"
          [(ngModel)]="newMessage"
          placeholder="Type a message..."
          (keyup.enter)="sendMessage()"
        />
        <button class="btn btn-primary" (click)="sendMessage()">Send</button>
      </div>
    </div>
  </ng-container>
  <ng-template #inbox>
    <div class="inbox-placeholder">
      <h2 class="h4">Messages</h2>
      <p>Search for users to start a conversation.</p>
      <button class="btn btn-primary" (click)="goToSearch()">Search Users</button>
    </div>
  </ng-template>
</div>
