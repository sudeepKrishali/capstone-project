<div class="messages-container">
  <ng-container *ngIf="chatUserId; else inbox">
    <div class="chat-header">
      <a routerLink="/messages" class="back-link">← Back</a>
      <h2>Chat with {{ otherUser?.username || 'User' }}</h2>
    </div>
    <div *ngIf="loading" class="loading">Loading...</div>
    <div class="chat-area">
      <div class="messages-list">
        <div
          *ngFor="let msg of messages"
          [class.sent]="msg.senderId === currentUserId"
          [class.received]="msg.senderId !== currentUserId"
          class="message-bubble"
        >
          <span class="msg-text">{{ msg.messageContent }}</span>
          <span class="msg-time">{{ msg.timeStamp | date:'short' }}</span>
        </div>
      </div>
      <div class="send-area">
        <input
          type="text"
          [(ngModel)]="newMessage"
          placeholder="Type a message..."
          (keyup.enter)="sendMessage()"
        />
        <button (click)="sendMessage()">Send</button>
      </div>
    </div>
  </ng-container>
  <ng-template #inbox>
    <div class="inbox-placeholder">
      <h2>Messages</h2>
      <p>Search for users to start a conversation.</p>
      <button (click)="goToSearch()">Search Users</button>
    </div>
  </ng-template>
</div>
