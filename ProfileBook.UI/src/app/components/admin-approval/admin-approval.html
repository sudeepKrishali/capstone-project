<div class="admin-container py-4 px-2">
  <div class="card admin-card shadow-sm">
    <div class="card-header admin-card-header d-flex justify-content-between align-items-center">
      <h2 class="h5 mb-0">Pending Post Approvals</h2>
      <span class="badge bg-primary-subtle text-primary" *ngIf="pendingPosts.length > 0">
        {{ pendingPosts.length }} pending
      </span>
    </div>

    <div class="card-body">
      <div *ngIf="pendingPosts.length === 0" class="no-posts text-muted small mb-0">
        No posts awaiting approval.
      </div>

      <div *ngFor="let post of pendingPosts" class="approval-card list-group-item d-flex justify-content-between align-items-start gap-3">
        <div class="post-info flex-grow-1 min-w-0">
          <p class="mb-1">
            <strong>User:</strong> {{ post.user?.username || 'Unknown' }}
          </p>
          <p class="mb-2">{{ post.content }}</p>
          <img
            *ngIf="post.postImage"
            [src]="'https://localhost:7048' + post.postImage"
            alt="Post image preview"
            class="preview-img img-thumbnail"
          />
        </div>
        <button type="button" (click)="approvePost(post.postId)" class="btn btn-primary btn-sm approve-btn">
          Approve Post
        </button>
      </div>
    </div>
  </div>
</div>
