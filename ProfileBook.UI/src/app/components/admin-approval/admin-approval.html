<div class="admin-container">
  <div class="card admin-card">
    <div class="card-header admin-card-header d-flex justify-content-between align-items-center">
      <h2 class="h5 mb-0">Pending Post Approvals</h2>
      <span class="badge bg-primary-subtle text-primary" *ngIf="pendingPosts.length > 0">
        {{ pendingPosts.length }} pending
      </span>
    </div>

    <div class="card-body">
      <div *ngIf="pendingPosts.length === 0" class="no-posts">
        No posts awaiting approval.
      </div>

      <div *ngFor="let post of pendingPosts" class="approval-card">
        <div class="post-info">
          <p class="mb-1">
            <strong>User:</strong> {{ post.user?.username || 'Unknown' }}
          </p>
          <p class="mb-2">{{ post.content }}</p>
          <img
            *ngIf="post.postImage"
            [src]="'https://localhost:7048' + post.postImage"
            alt="Post image preview"
            class="preview-img"
          />
        </div>
        <button (click)="approvePost(post.postId)" class="approve-btn">
          Approve Post
        </button>
      </div>
    </div>
  </div>
</div>
